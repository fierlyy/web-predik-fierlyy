        .kecil { color:#4d9eff; text-shadow:0 0 5px #0044ff; }
        .besar { color:#ff4d4d; text-shadow:0 0 6px #ff0000; }

        .flex-btns { display:flex; gap:15px; margin-top:15px; }
        .status { background:#0a0502e6; border-radius:24px; padding:14px; font-size:0.85rem; margin-top:18px; border-left:4px solid #c0392b; color:#f0dba0; }

        @media (max-width:700px){ .tabs{justify-content:center;} .header{flex-direction:column;text-align:center;} }

</head>
<body>
<div id="app"></div>

<script>
    // ======================= KONFIGURASI FIREBASE (GANTI DENGAN MILIK ANDA) =======================
    const firebaseConfig = {
        apiKey: "AIzaSyBSbKiA1hIybdho0CV8Xjs4TJvimXs7b7g",
        authDomain: "prediksi-mafia.firebaseapp.com",
        projectId: "prediksi-mafia",
        storageBucket: "prediksi-mafia.firebasestorage.app",
        messagingSenderId: "93340442405",
        appId: "1:93340442405:web:18a904ae85f08bf8e5c4cc"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Konfigurasi
    const ADMIN_PASSWORD = "padel001";
    const WA_NUMBER = "089527933537";

    let currentUser = null;
    let currentUserDocId = null;

    function getFutureDate(days) {
        let date = new Date();
        date.setDate(date.getDate() + days);
        return date.toISOString().split('T')[0];
    }

    // ======================= RENDER HALAMAN =======================
    function renderUserLogin() {
        document.getElementById("app").innerHTML = `
            <div class="login-container">
                <h2>⚜️ FIERLYY BOSS ⚜️</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button id="loginBtn">🔪 MASUK KE SARANG 🔪</button>
                <div id="loginError" class="error"></div>
                <div class="small-link" id="goToAdmin">🔑 Admin Panel</div>
            </div>
        `;
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const doc = await db.collection("users").doc(userCred.user.uid).get();
                if (!doc.exists) throw new Error("Akun tidak terdaftar di database.");
                const expiry = doc.data().expiry;
                if (expiry && expiry < new Date().toISOString().split('T')[0]) {
                    await auth.signOut();
                    throw new Error("Akun sudah expired. Hubungi admin untuk perpanjang via WhatsApp.");
                }
                currentUser = userCred.user.email;
                currentUserDocId = userCred.user.uid;
                renderDashboard();
            } catch (err) {
                document.getElementById("loginError").innerText = err.message;
            }
        };
        document.getElementById("goToAdmin").onclick = () => renderAdminLogin();
    }

    function renderAdminLogin() {
        document.getElementById("app").innerHTML = `
            <div class="login-container">
                <h2>👑 ADMIN LOGIN</h2>
                <input type="password" id="adminPassword" placeholder="Password Admin">
                <button id="adminLoginBtn">MASUK SEBAGAI ADMIN</button>
                <div id="adminError" class="error"></div>
                <div class="small-link" id="backToUser">Kembali ke Login User</div>
            </div>
        `;
        document.getElementById("adminLoginBtn").onclick = () => {
            let pass = document.getElementById("adminPassword").value;
            if (pass === ADMIN_PASSWORD) {
                renderAdminPanel();
            } else {
                document.getElementById("adminError").innerText = "Password admin salah!";
            }
        };
        document.getElementById("backToUser").onclick = () => renderUserLogin();
    }

    async function renderAdminPanel() {
        const snapshot = await db.collection("users").get();
        let users = [];
        snapshot.forEach(doc => users.push({ uid: doc.id, ...doc.data() }));
        document.getElementById("app").innerHTML = `
            <div class="admin-container">
                <h2>👑 ADMIN PANEL</h2>
                <div style="text-align:left; margin-bottom:15px;">
                    <input type="email" id="newEmail" placeholder="Email user baru">
                    <input type="password" id="newPassword" placeholder="Password">
                    <input type="number" id="newDays" placeholder="Masa aktif (hari)" value="30">
                    <button id="addUserBtn">+ TAMBAH USER</button>
                </div>
                <div class="user-list" id="userList"></div>
                <button id="backToLogin">KEMBALI KE LOGIN USER</button>
                <div id="adminError" class="error"></div>
            </div>
        `;
        function refreshUserList() {
            const container = document.getElementById("userList");
            if (!container) return;
            container.innerHTML = users.map(u => `
                <div class="user-item">
                    <span><strong>${u.email}</strong> | Expiry: ${u.expiry || '-'}</span>
                    <div style="display:flex; gap:5px;">
                        <button class="extendBtn" data-uid="${u.uid}" data-days="7">+7 hari</button>
                        <button class="extendBtn" data-uid="${u.uid}" data-days="30">+30 hari</button>
                        <button class="deleteBtn" data-uid="${u.uid}">HAPUS</button>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.extendBtn').forEach(btn => {
                btn.onclick = async () => {
                    const uid = btn.dataset.uid;
                    const days = parseInt(btn.dataset.days);
                    const newExpiry = getFutureDate(days);
                    await db.collection("users").doc(uid).update({ expiry: newExpiry });
                    const user = users.find(u => u.uid === uid);
                    if (user) user.expiry = newExpiry;
                    refreshUserList();
                    document.getElementById("adminError").innerText = `User ${user.email} diperpanjang +${days} hari.`;
                };
            });
            document.querySelectorAll('.deleteBtn').forEach(btn => {
                btn.onclick = async () => {
                    const uid = btn.dataset.uid;
                    await db.collection("users").doc(uid).delete();
                    users = users.filter(u => u.uid !== uid);
                    refreshUserList();
                };
            });
        }
        document.getElementById("addUserBtn").onclick = async () => {
            const email = document.getElementById("newEmail").value.trim();
            const password = document.getElementById("newPassword").value;
            const days = parseInt(document.getElementById("newDays").value);
            if (!email || !password || isNaN(days)) {
                document.getElementById("adminError").innerText = "Isi semua field!";
                return;
            }
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection("users").doc(userCred.user.uid).set({
                    email: email,
                    expiry: getFutureDate(days),
                    createdAt: new Date().toISOString()
                });
                users.push({ uid: userCred.user.uid, email, expiry: getFutureDate(days) });
                refreshUserList();
                document.getElementById("newEmail").value = "";
                document.getElementById("newPassword").value = "";
                document.getElementById("adminError").innerText = "User berhasil ditambahkan!";
            } catch (err) {
                document.getElementById("adminError").innerText = err.message;
            }
        };
        document.getElementById("backToLogin").onclick = () => renderUserLogin();
        refreshUserList();
    }

    // ======================= DASHBOARD PREDIKSI (LENGKAP) =======================
    function renderDashboard() {
        let expiry = "";
        db.collection("users").doc(currentUserDocId).get().then(doc => {
            expiry = doc.data().expiry;
            const expirySpan = document.getElementById("expiryText");
            if (expirySpan) expirySpan.innerText = expiry;
        });
        document.getElementById("app").innerHTML = `
            <div class="dashboard" style="display:block;">
                <div class="header">
                    <div class="logo-area">
                        <img src="https://img2.pixhost.to/images/7301/716584330_xlyy-sera-assistant.jpg" alt="Logo">
                        <img src="https://img2.pixhost.to/images/7301/716590463_xlyy-sera-assistant.jpg" alt="Mafia">
                    </div>
                    <h2>🔥 FIERLYY BOSS BERAS 🔥</h2>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span style="color:#f3d382;">${currentUser}</span>
                        <button id="logoutBtn">KELUAR</button>
                    </div>
                </div>
                <div class="tabs">
                    <div class="tab active" data-tab="ungu">🔫 DADU UNGU (D8)</div>
                    <div class="tab" data-tab="biru">🌀 9 DADU BIRU (1 MATCH)</div>
                    <div class="tab" data-tab="mpl">🏆 MPL (BEST OF 3)</div>
                </div>
                <div class="content">
                    <div id="panelUngu" class="panel active-panel">
                        <div class="card">
                            <div class="label">🎲 POLA AWAL-AKHIR (angka 1-8) — contoh: 7-3</div>
                            <input type="text" id="polaUngu" placeholder="7-3" value="5-2">
                            <button id="predUnguBtn">🔮 PREDIKSI NEXT ROLL (D8)</button>
                            <div id="hasilUngu" class="result">
                                <div class="result-big">—</div>
                                <div class="small-text">Hasil prediksi untuk roll berikutnya</div>
                            </div>
                            <div class="status">📌 Weighted trend + histori lokal. KECIL (1-4) / BESAR (5-8).</div>
                        </div>
                    </div>
                    <div id="panelBiru" class="panel">
                        <div class="card">
                            <div class="label">🎲 POLA DUA ROLL TERAKHIR (9-54) — contoh: 35-19</div>
                            <input type="text" id="polaBiru" placeholder="35-19" value="42-27">
                            <button id="predBiruBtn">⚡ PREDIKSI GAME SELANJUTNYA</button>
                            <div id="hasilBiru" class="result">
                                <div class="result-big">—</div>
                                <div class="small-text">Berdasarkan rumus deviasi & titik jenuh (Anti-RNG)</div>
                            </div>
                            <div class="status">📌 Rumus: jarak ke tengah >5 → rebound, else ikuti trend. Range ±3.</div>
                        </div>
                    </div>
                    <div id="panelMpl" class="panel">
                        <div class="card">
                            <div class="label">📌 MASUKKAN POLA (AWAL-AKHIR) UNTUK SETIAP MATCH (9-54)</div>
                            <input type="text" id="mplPola1" placeholder="Match 1: 35-19" value="35-19">
                            <input type="text" id="mplPola2" placeholder="Match 2: 42-27" value="42-27">
                            <input type="text" id="mplPola3" placeholder="Match 3 (opsional)" value="">
                            <div class="flex-btns">
                                <button id="resetMplBtn" style="background:#4a351c;">⟳ RESET MPL</button>
                                <button id="determineMplBtn">🔥 TENTUKAN PEMENANG</button>
                            </div>
                            <div id="mplStatus" class="status">⚡ Isi M1 & M2. Jika prediksi M1 = M2 → langsung menang tanpa M3.</div>
                        </div>
                    </div>
                </div>
                <div class="gallery">
                    <img src="https://img2.pixhost.to/images/7301/716590479_xlyy-sera-assistant.jpg" alt="ashura1">
                    <img src="https://img2.pixhost.to/images/7301/716590485_xlyy-sera-assistant.jpg" alt="ashura2">
                    <img src="https://img2.pixhost.to/images/7301/716590523_xlyy-sera-assistant.jpg" alt="ashura3">
                    <img src="https://img2.pixhost.to/images/7301/716590544_xlyy-sera-assistant.jpg" alt="ashura4">
                </div>
                <div class="footer">
                    ⚜️ Masa aktif sampai: <span id="expiryText">-</span> ⚜️<br>
                    📞 Untuk perpanjangan masa aktif, hubungi WhatsApp: <a href="https://wa.me/${WA_NUMBER}" target="_blank" class="wa-link">${WA_NUMBER}</a><br>
                    CARA: Pilih menu, masukkan pola, klik prediksi. MPL: jika prediksi M1=M2 langsung menang.
                </div>
            </div>
        `;
        attachDashboardEvents();
        db.collection("users").doc(currentUserDocId).get().then(doc => {
            const expirySpan = document.getElementById("expiryText");
            if (expirySpan) expirySpan.innerText = doc.data().expiry;
        });
    }

    function attachDashboardEvents() {
        const tabs = document.querySelectorAll('.tab');
        const panels = {
            ungu: document.getElementById('panelUngu'),
            biru: document.getElementById('panelBiru'),
            mpl: document.getElementById('panelMpl')
        };
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.keys(panels).forEach(p => panels[p].classList.remove('active-panel'));
                panels[tab.dataset.tab].classList.add('active-panel');
            });
        });
        document.getElementById('logoutBtn').onclick = async () => {
            await auth.signOut();
            currentUser = null;
            renderUserLogin();
        };
        // Prediksi Ungu
        document.getElementById('predUnguBtn').addEventListener('click', () => {
            let val = document.getElementById('polaUngu').value.trim();
            if (!val.includes('-')) { alert("Format: angka-angka (1-8)"); return; }
            let [a,b] = val.split('-').map(Number);
            if (isNaN(a)||isNaN(b)||a<1||a>8||b<1||b>8) { alert("Angka 1-8"); return; }
            let { hasil, confidence, rangeMin, rangeMax } = prediksiUngu(a,b);
            document.getElementById('hasilUngu').innerHTML = `
                <div class="result-big ${hasil === 'BESAR' ? 'besar' : 'kecil'}">${hasil}</div>
                <div class="small-text">🎯 RANGE ANGKA: ${rangeMin} - ${rangeMax} | Akurasi: ${confidence}%</div>
                <div class="small-text">📌 Prediksi untuk roll berikutnya (D8)</div>
            `;
        });
        // Prediksi Biru
        document.getElementById('predBiruBtn').addEventListener('click', () => {
            let pola = document.getElementById('polaBiru').value.trim();
            let pred = prediksiMafia(pola);
            if (!pred) { alert("Format salah! Contoh: 35-19 (9-54)"); return; }
            document.getElementById('hasilBiru').innerHTML = `
                <div class="result-big ${pred.hasil === 'BESAR' ? 'besar' : 'kecil'}">${pred.hasil}</div>
                <div class="small-text">🎯 RENTANG ANGKA: ${pred.rangeMin} - ${pred.rangeMax} | Akurasi: ${pred.akurasi}%</div>
                <div class="small-text">📌 Prediksi untuk roll berikutnya (9 dadu biru)</div>
            `;
        });
        // MPL
        document.getElementById('resetMplBtn').onclick = () => {
            document.getElementById('mplPola1').value = '';
            document.getElementById('mplPola2').value = '';
            document.getElementById('mplPola3').value = '';
            document.getElementById('mplStatus').innerHTML = "⚡ MPL direset. Isi M1 & M2. Jika prediksi sama → langsung menang.";
        };
        document.getElementById('determineMplBtn').onclick = () => {
            let p1 = document.getElementById('mplPola1').value.trim();
            let p2 = document.getElementById('mplPola2').value.trim();
            let p3 = document.getElementById('mplPola3').value.trim();
            let statusDiv = document.getElementById('mplStatus');
            let pred1 = getPred(p1);
            let pred2 = getPred(p2);
            if (!pred1 || !pred2) {
                statusDiv.innerHTML = "⚠️ Masukkan pola valid M1 & M2 (contoh: 35-19)";
                return;
            }
            if (pred1 === pred2) {
                statusDiv.innerHTML = `🏆 PEMENANG MPL: ${pred1} 🏆 (karena prediksi M1 dan M2 sama, langsung menang)<br>🔮 Prediksi M1: ${pred1} | M2: ${pred2}`;
                return;
            }
            if (!p3) {
                statusDiv.innerHTML = `⚔️ Prediksi M1 = ${pred1}, M2 = ${pred2} (berbeda). Masukkan pola M3.`;
                return;
            }
            let pred3 = getPred(p3);
            if (!pred3) {
                statusDiv.innerHTML = "❌ Pola M3 tidak valid.";
                return;
            }
            let countB = (pred1==='BESAR'?1:0)+(pred2==='BESAR'?1:0)+(pred3==='BESAR'?1:0);
            let countK = 3 - countB;
            let winner = countB > countK ? "BESAR" : (countK > countB ? "KECIL" : "DRAW");
            statusDiv.innerHTML = `🏆 PEMENANG MPL: ${winner} 🏆<br>📊 Hasil prediksi: M1=${pred1}, M2=${pred2}, M3=${pred3} → (B:${countB}, K:${countK})`;
        };
    }

    // Fungsi prediksi
    function prediksiUngu(awal, akhir) {
        let history = JSON.parse(localStorage.getItem("historyUngu_" + currentUser) || "[]");
        let weightedTrend = akhir - awal;
        if (history.length > 0) {
            let all = [...history, {awal, akhir}];
            let sumWeight = 0, sumDiff = 0;
            for (let i=0; i<all.length; i++) {
                let weight = i+1;
                let diff = all[i].akhir - all[i].awal;
                sumDiff += diff * weight;
                sumWeight += weight;
            }
            weightedTrend = sumDiff / sumWeight;
        }
        history.push({awal, akhir});
        if(history.length>3) history.shift();
        localStorage.setItem("historyUngu_" + currentUser, JSON.stringify(history));
        let hasil = "", confidence = 0;
        let jarak = akhir - 4.5;
        if (akhir >= 7) { hasil = "KECIL"; confidence = 94; }
        else if (akhir <= 2) { hasil = "BESAR"; confidence = 94; }
        else if (akhir >= 6) { hasil = "KECIL"; confidence = 85; }
        else if (akhir <= 3) { hasil = "BESAR"; confidence = 85; }
        else if (jarak > 1.5) { hasil = "KECIL"; confidence = 72 + Math.min(20, Math.abs(weightedTrend)*4); }
        else if (jarak < -1.5) { hasil = "BESAR"; confidence = 72 + Math.min(20, Math.abs(weightedTrend)*4); }
        else {
            if (weightedTrend > 0.3) { hasil = "BESAR"; confidence = 68 + Math.min(25, weightedTrend*10); }
            else if (weightedTrend < -0.3) { hasil = "KECIL"; confidence = 68 + Math.min(25, Math.abs(weightedTrend)*10); }
            else { hasil = jarak > 0 ? "KECIL" : "BESAR"; confidence = 65; }
        }
        confidence = Math.min(98, Math.floor(confidence));
        let rangeMin, rangeMax;
        if (hasil === "BESAR") {
            let base = Math.min(7, Math.max(5, akhir + Math.sign(weightedTrend)*1));
            rangeMin = Math.max(5, base);
            rangeMax = Math.min(8, rangeMin+2);
            if(rangeMax - rangeMin < 2) rangeMax = Math.min(8, rangeMax+1);
            rangeMin = Math.max(5, rangeMin);
            rangeMax = Math.min(8, rangeMax);
        } else {
            let base = Math.max(1, Math.min(3, akhir + Math.sign(weightedTrend)*1));
            rangeMin = Math.max(1, base);
            rangeMax = Math.min(4, rangeMin+2);
            if(rangeMax - rangeMin < 2) rangeMin = Math.max(1, rangeMin-1);
            rangeMin = Math.min(4, rangeMin);
            rangeMax = Math.min(4, rangeMax);
        }
        if(rangeMin > rangeMax) { let t=rangeMin; rangeMin=rangeMax; rangeMax=t; }
        return { hasil, confidence, rangeMin, rangeMax };
    }
    function prediksiMafia(polaStr) {
        if (!polaStr || !polaStr.includes('-')) return null;
        let [awal, akhir] = polaStr.split('-').map(num => parseInt(num));
        if (isNaN(awal) || isNaN(akhir)) return null;
        if (awal < 9 || awal > 54 || akhir < 9 || akhir > 54) return null;
        let titikTengah = 31.5;
        let trend = akhir - awal;
        let jarakKeTengah = akhir - titikTengah;
        let hasil = "";
        if (jarakKeTengah > 5) hasil = "KECIL";
        else if (jarakKeTengah < -5) hasil = "BESAR";
        else hasil = trend >= 0 ? "BESAR" : "KECIL";
        let rangeMin, rangeMax;
        if (hasil === "BESAR") {
            rangeMin = Math.max(32, Math.min(51, akhir + (trend > 0 ? 3 : 6)));
        } else {
            rangeMin = Math.max(9, Math.min(28, akhir - (trend < 0 ? 3 : 6)));
        }
        rangeMax = rangeMin + 3;
        rangeMin = Math.min(54, Math.max(9, rangeMin));
        rangeMax = Math.min(54, Math.max(9, rangeMax));
        if(rangeMin > rangeMax) { let t=rangeMin; rangeMin=rangeMax; rangeMax=t; }
        let akurasi = Math.min(98, Math.floor(70 + Math.abs(jarakKeTengah)));
        return { hasil, rangeMin, rangeMax, akurasi };
    }
    function getPred(pola) {
        let p = prediksiMafia(pola);
        return p ? p.hasil : null;
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists && (!doc.data().expiry || doc.data().expiry >= new Date().toISOString().split('T')[0])) {
                currentUser = user.email;
                currentUserDocId = user.uid;
                renderDashboard();
            } else {
                await auth.signOut();
                renderUserLogin();
            }
        } else {
            renderUserLogin();
        }
    });
